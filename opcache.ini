; /usr/local/etc/php/conf.d/opcache.ini
; Configuração otimizada para a Fenda (Render + PHP 8.5)

; Ativa o OPcache
opcache.enable=1
opcache.enable_cli=0

; Memória disponível para o cache (128MB é suficiente para centenas de arquivos)
opcache.memory_consumption=128

; Tamanho da string internada (economiza memória para strings repetidas)
opcache.interned_strings_buffer=8

; Número máximo de arquivos PHP que podem ser cacheados
opcache.max_accelerated_files=4000

; Frequência de revalidação dos arquivos (60 segundos em desenvolvimento)
; Em produção, pode aumentar para 3600 ou 0 para desabilitar
opcache.revalidate_freq=60

; Desabilita a revalidação no início da requisição (melhora performance)
opcache.revalidate_path=0

; Verifica se o arquivo foi modificado (em desenvolvimento, deixamos como 0 para performance)
opcache.validate_timestamps=1

; Salva comentários (não necessário, desliga para economia)
opcache.save_comments=0
opcache.load_comments=0

; Habilita a otimização de loops e estruturas
opcache.optimization_level=0x7FFFBFFF

; Desabilita a revalidação de arquivos na CLI
opcache.validate_root=0

; Libera memória rapidamente ao final da requisição
opcache.fast_shutdown=1

; Se o servidor tiver pouca memória, ative:
; opcache.file_cache=/tmp/opcache
; opcache.file_cache_only=0